                type: string
                example: '12:00'
              end:
                type: string
                example: '13:00'
    WorkingPlanPayload:
      type: object
      description: Full week working plan. Each day must be either a WorkingDayPlan object or null (day off).
      properties:
        monday:
          $ref: '#/components/schemas/WorkingDayPlan'
        tuesday:
          $ref: '#/components/schemas/WorkingDayPlan'
        wednesday:
          $ref: '#/components/schemas/WorkingDayPlan'
