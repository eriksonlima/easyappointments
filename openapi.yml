openapi: 3.0.3
info:
  title: Easy!Appointments API
  version: 1.0.0
  description: These are the OpenAPI specs that describe the REST API of Easy!Appointments.
  termsOfService: https://easyappointments.org/terms-and-conditions
  contact:
    name: Easy!Appointments
    url: https://easyappointments.org
    email: info@easyappointments.org
  license:
    name: GPL-3.0
    url: https://www.gnu.org/licenses/gpl-3.0.en.html
externalDocs:
  description: Find out more about Easy!Appointments
  url: https://easyappointments.org/docs.html
servers:
  - url: http://localhost/api/v1
    description: Ambiente local (Docker)
  - url: http://localhost/index.php/api/v1
    description: Ambiente local — URL alternativa com index.php
  - url: https://demo.easyappointments.org/index.php/api/v1/
    description: Demo
tags:
  - name: admins
  - name: appointments
  - name: availabilities
  - name: blocked_periods
  - name: companies
    description: Multi-company management — create, read, update and delete companies, manage provider working plans per company.
  - name: customers
  - name: providers
  - name: secretaries
  - name: service_categories
  - name: services
  - name: settings
  - name: unavailabilities
  - name: webhooks
  - name: working_plan_exceptions
paths:
  /availabilities:
    get:
      tags:
        - availabilities
      summary: Gets availability
      description: >-
        Returns available time slots for a provider on a given date.
        When `companyId` is provided, the provider's working plan for that specific company is used.
        When omitted, the provider's personal (particular) working plan is used.
      parameters:
        - name: providerId
          in: query
          required: true
          schema:
            type: integer
        - name: serviceId
          in: query
          required: true
          schema:
            type: integer
        - name: date
          in: query
          required: true
          schema:
            type: string
            example: '2026-06-18'
        - name: companyId
          in: query
          description: Filter availability by company working plan. Omit to use the provider's personal (particular) working plan.
          schema:
            type: integer
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
        '401':
          description: Unauthorized
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - BearerToken: [ ]
        - BasicAuth: [ ]
